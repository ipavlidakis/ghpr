name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # The default toolchain lags; the package needs Swift 6.2+.
      - name: Select latest Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
          swift --version

      - name: Build distribution tarball
        run: make dist VERSION=${GITHUB_REF_NAME#v}

      - name: Create release and upload asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        # Tolerate manually-created releases: create if missing, then upload
        # without clobbering existing assets.
        run: |
          gh release create "$GITHUB_REF_NAME" --generate-notes || true
          gh release upload "$GITHUB_REF_NAME" dist/*.tar.gz || true
