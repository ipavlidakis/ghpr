name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build distribution tarball
        run: make dist VERSION=${GITHUB_REF_NAME#v}

      - name: Create release and upload asset
        env:
          GH_TOKEN: ${{ github.token }}
        # Tolerate manually-created releases: create if missing, then upload
        # without clobbering existing assets.
        run: |
          gh release create "$GITHUB_REF_NAME" --generate-notes || true
          gh release upload "$GITHUB_REF_NAME" dist/*.tar.gz || true
